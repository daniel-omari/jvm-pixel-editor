plugins {
    id 'java'
    id 'application'
    id 'org.jetbrains.kotlin.jvm' version '2.0.21'
}

group = 'com.danielomari.pixeleditor'
version = '1.0.7-SNAPSHOT'

repositories {
    mavenCentral()
}

dependencies {
    implementation group: 'com.formdev', name: 'flatlaf', version: '3.4.1'
    testImplementation 'org.junit.jupiter:junit-jupiter:5.10.2'
    testRuntimeOnly 'org.junit.platform:junit-platform-launcher'
}

java {
    toolchain {
        languageVersion.set(JavaLanguageVersion.of(17))
    }
}

// Kotlin compiles for the same JVM target; sources live in src/main/kotlin and
// interoperate freely with the Java sources in src/main/java.
kotlin {
    jvmToolchain(17)
}

// --enable-preview applies only to the Java sources; Kotlin does not need it.
tasks.withType(JavaCompile).configureEach {
    options.compilerArgs += "--enable-preview"
}

tasks.withType(JavaExec).configureEach {
    jvmArgs += "--enable-preview"
}

// Headless unit tests (no display needed): the layer engine is pure image /
// collection logic, so it runs anywhere, including CI.
test {
    useJUnitPlatform()
    systemProperty 'java.awt.headless', 'true'
    jvmArgs '--enable-preview'
}

application {
    mainClass = 'com.danielomari.pixeleditor.PixelGraphicEditor'
}

jar {
    archiveBaseName = 'pixelbasededitor'
    archiveVersion = "$project.version"
}
