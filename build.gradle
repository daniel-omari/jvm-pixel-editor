plugins {
    id 'java'
    id 'application'
    id 'org.jetbrains.kotlin.jvm' version '2.0.21'
}

group = 'com.danielomari.pixeleditor'
version = '1.0.7-SNAPSHOT'

repositories {
    mavenCentral()
}

dependencies {
    implementation group: 'com.formdev', name: 'flatlaf', version: '3.4.1'
    testImplementation 'org.junit.jupiter:junit-jupiter:5.10.2'
    testRuntimeOnly 'org.junit.platform:junit-platform-launcher'
}

java {
    toolchain {
        languageVersion.set(JavaLanguageVersion.of(17))
    }
}

// Kotlin compiles for the same JVM target; sources live in src/main/kotlin and
// interoperate freely with the Java sources in src/main/java.
kotlin {
    jvmToolchain(17)
}

// --enable-preview applies only to the Java sources; Kotlin does not need it.
tasks.withType(JavaCompile).configureEach {
    options.compilerArgs += "--enable-preview"
}

tasks.withType(JavaExec).configureEach {
    jvmArgs += "--enable-preview"
}

// Headless unit tests (no display needed): the layer engine is pure image /
// collection logic, so it runs anywhere, including CI.
test {
    useJUnitPlatform()
    systemProperty 'java.awt.headless', 'true'
    jvmArgs '--enable-preview'
}

application {
    mainClass = 'com.danielomari.pixeleditor.PixelGraphicEditor'
}

jar {
    archiveBaseName = 'pixelbasededitor'
    archiveVersion = "$project.version"
}

// Build a native installer with the JDK's jpackage tool: `gradlew jpackage`.
// On Windows the msi type needs the WiX Toolset 3.x on the PATH; switch
// '--type' to 'app-image' for a plain runnable folder with no extra tooling.
tasks.register('jpackage', Exec) {
    dependsOn jar
    group = 'distribution'
    description = 'Packages the app as a native installer (build/dist).'

    def isWindows = System.getProperty('os.name').toLowerCase().contains('win')
    def jpackageBin = new File(System.getProperty('java.home'),
            isWindows ? 'bin/jpackage.exe' : 'bin/jpackage')
    def appVersion = project.version.toString().replace('-SNAPSHOT', '')

    def args = [jpackageBin.absolutePath,
                '--name', 'Pixel Editor',
                '--app-version', appVersion,
                '--input', layout.buildDirectory.dir('libs').get().asFile.absolutePath,
                '--main-jar', "pixelbasededitor-${project.version}.jar",
                '--add-modules', 'java.se,jdk.unsupported',
                '--java-options', '--enable-preview',
                '--dest', layout.buildDirectory.dir('dist').get().asFile.absolutePath]
    if (isWindows) {
        args += ['--type', 'msi', '--win-menu', '--win-shortcut', '--win-dir-chooser']
    }
    commandLine args
}
